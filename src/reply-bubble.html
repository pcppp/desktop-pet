<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reply Bubble</title>
    <style>
      :root {
        color-scheme: light;
        --bg: rgba(255, 255, 255, 0.995);
        --border: #111111;
        --shadow: rgba(0, 0, 0, 0.18);
        --text: #111111;
        --content-pad-x: 16px;
        --content-pad-top: 14px;
        --preview-pad-bottom: 22px;
        --expanded-pad-bottom: 0px;
        --overflow-indicator-height: 30px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
      }

      body {
        padding: 10px 10px 10px 24px;
      }

      body[data-side="left"] {
        padding: 10px 24px 10px 10px;
      }

      #bubble {
        position: relative;
        width: 100%;
        height: 100%;
        border: 3px solid var(--border);
        border-radius: 18px;
        background: var(--bg);
        box-shadow: 0 12px 28px var(--shadow);
        color: var(--text);
        overflow: visible;
      }

      #bubble::before,
      #bubble::after {
        content: "";
        position: absolute;
        top: 24px;
        width: 0;
        height: 0;
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        pointer-events: none;
      }

      #bubble[data-side="right"]::before {
        left: -20px;
        border-right: 20px solid var(--border);
      }

      #bubble[data-side="right"]::after {
        left: -14px;
        border-right: 16px solid var(--bg);
      }

      #bubble[data-side="left"]::before {
        right: -20px;
        border-left: 20px solid var(--border);
      }

      #bubble[data-side="left"]::after {
        right: -14px;
        border-left: 16px solid var(--bg);
      }

      #content-viewport {
        width: 100%;
        height: 100%;
        overflow: hidden;
        padding:
          var(--content-pad-top)
          var(--content-pad-x)
          var(--preview-pad-bottom)
          var(--content-pad-x);
      }

      #content-viewport.expanded {
        overflow: auto;
        padding-bottom: var(--expanded-pad-bottom);
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      #content-viewport.expanded::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      #content {
        width: 100%;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #overflow-indicator {
        position: absolute;
        left: var(--content-pad-x);
        right: var(--content-pad-x);
        bottom: 0;
        display: none;
        align-items: flex-end;
        justify-content: center;
        height: calc(var(--preview-pad-bottom) + var(--overflow-indicator-height));
        padding-bottom: 6px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.84) 54%,
          rgba(255, 255, 255, 1) 100%
        );
        color: var(--text);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.18em;
        pointer-events: none;
      }

      #bubble[data-show-overflow="true"] #overflow-indicator {
        display: flex;
      }
    </style>
  </head>
  <body data-side="right">
    <div id="bubble" data-side="right" data-show-overflow="false">
      <div id="content-viewport">
        <div id="content"></div>
      </div>
      <div id="overflow-indicator" aria-hidden="true">...</div>
    </div>
    <script>
      const bubble = document.getElementById("bubble");
      const body = document.body;
      const contentViewport = document.getElementById("content-viewport");
      const content = document.getElementById("content");
      const SCROLL_DELTA_SCALE = 0.28;
      const SCROLL_DELTA_MAX = 24;
      let expanded = false;
      let overflowAnimationFrame = 0;

      function setExpanded(nextExpanded) {
        expanded = nextExpanded;
        contentViewport.classList.toggle("expanded", expanded);
        bubble.dataset.showOverflow = "false";
        scheduleOverflowStateUpdate();
      }

      function getPreviewInnerHeight() {
        const styles = window.getComputedStyle(document.documentElement);
        const paddingTop = parseFloat(styles.getPropertyValue("--content-pad-top")) || 14;
        const paddingBottom = parseFloat(styles.getPropertyValue("--preview-pad-bottom")) || 22;
        return contentViewport.clientHeight - paddingTop - paddingBottom;
      }

      function updateOverflowState() {
        overflowAnimationFrame = 0;
        const innerHeight = getPreviewInnerHeight();
        const isOverflowing = content.scrollHeight > innerHeight + 1;
        bubble.dataset.showOverflow = !expanded && isOverflowing ? "true" : "false";
      }

      function scheduleOverflowStateUpdate() {
        if (overflowAnimationFrame) {
          window.cancelAnimationFrame(overflowAnimationFrame);
        }

        overflowAnimationFrame = window.requestAnimationFrame(() => {
          updateOverflowState();
        });
      }

      window.replyBubbleBridge.onShow((payload) => {
        const fullText = String(payload && payload.fullText ? payload.fullText : "");
        content.textContent = fullText;
        content.dataset.fullText = fullText;
        contentViewport.scrollTop = 0;
        setExpanded(false);
      });

      window.replyBubbleBridge.onHide(() => {
        setExpanded(false);
        contentViewport.scrollTop = 0;
      });

      window.replyBubbleBridge.onLayout((payload) => {
        const side = payload && payload.side === "left" ? "left" : "right";
        bubble.dataset.side = side;
        body.dataset.side = side;
      });

      document.body.addEventListener("mouseenter", () => {
        setExpanded(true);
        window.replyBubbleBridge.hovered(true);
      });

      document.body.addEventListener("mouseleave", () => {
        setExpanded(false);
        contentViewport.scrollTop = 0;
        window.replyBubbleBridge.hovered(false);
      });

      contentViewport.addEventListener(
        "wheel",
        (event) => {
          if (!expanded) {
            return;
          }

          event.preventDefault();
          const nextDelta = Math.max(
            -SCROLL_DELTA_MAX,
            Math.min(SCROLL_DELTA_MAX, event.deltaY * SCROLL_DELTA_SCALE)
          );
          contentViewport.scrollTop += nextDelta;
        },
        { passive: false }
      );

      window.addEventListener("resize", () => {
        scheduleOverflowStateUpdate();
      });
    </script>
  </body>
  </html>
