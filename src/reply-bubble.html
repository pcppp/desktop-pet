<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reply Bubble</title>
    <style>
      :root {
        color-scheme: light;
        --bg: rgba(255, 255, 255, 0.995);
        --border: #111111;
        --shadow: rgba(0, 0, 0, 0.18);
        --text: #111111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
      }

      body {
        padding: 10px 10px 10px 24px;
      }

      body[data-side="left"] {
        padding: 10px 24px 10px 10px;
      }

      #bubble {
        position: relative;
        width: 100%;
        height: 100%;
        border: 3px solid var(--border);
        border-radius: 18px;
        background: var(--bg);
        box-shadow: 0 12px 28px var(--shadow);
        color: var(--text);
        overflow: hidden;
      }

      #bubble::before,
      #bubble::after {
        content: "";
        position: absolute;
        top: 24px;
        width: 0;
        height: 0;
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        pointer-events: none;
      }

      #bubble[data-side="right"]::before {
        left: -20px;
        border-right: 20px solid var(--border);
      }

      #bubble[data-side="right"]::after {
        left: -14px;
        border-right: 16px solid var(--bg);
      }

      #bubble[data-side="left"]::before {
        right: -20px;
        border-left: 20px solid var(--border);
      }

      #bubble[data-side="left"]::after {
        right: -14px;
        border-left: 16px solid var(--bg);
      }

      #content {
        width: 100%;
        height: 100%;
        padding: 14px 16px;
        overflow: auto;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        scrollbar-gutter: stable;
      }

      #content.collapsed {
        display: -webkit-box;
        overflow: hidden;
        text-overflow: ellipsis;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      #content::-webkit-scrollbar {
        width: 8px;
      }

      #content::-webkit-scrollbar-thumb {
        background: rgba(74, 49, 31, 0.28);
        border-radius: 999px;
      }
    </style>
  </head>
  <body data-side="right">
    <div id="bubble" data-side="right">
      <div id="content" class="collapsed"></div>
    </div>
    <script>
      const bubble = document.getElementById("bubble");
      const body = document.body;
      const content = document.getElementById("content");
      const SCROLL_DELTA_SCALE = 0.28;
      const SCROLL_DELTA_MAX = 24;
      let expanded = false;

      function setExpanded(nextExpanded) {
        expanded = nextExpanded;
        content.classList.toggle("collapsed", !expanded);
      }

      function truncateToTwoLines(text) {
        const normalized = String(text || "").replace(/\s+\n/g, "\n").trim();
        const lines = normalized.split(/\n+/).filter(Boolean);

        if (lines.length <= 2) {
          return normalized;
        }

        return `${lines.slice(0, 2).join("\n")}...`;
      }

      window.replyBubbleBridge.onShow((payload) => {
        const fullText = String(payload && payload.fullText ? payload.fullText : "");
        const previewText = String(payload && payload.previewText ? payload.previewText : truncateToTwoLines(fullText));
        content.textContent = fullText;
        content.dataset.fullText = fullText;
        content.dataset.previewText = previewText;
        content.scrollTop = 0;
        setExpanded(false);
      });

      window.replyBubbleBridge.onHide(() => {
        setExpanded(false);
        content.scrollTop = 0;
      });

      window.replyBubbleBridge.onLayout((payload) => {
        const side = payload && payload.side === "left" ? "left" : "right";
        bubble.dataset.side = side;
        body.dataset.side = side;
      });

      document.body.addEventListener("mouseenter", () => {
        setExpanded(true);
        window.replyBubbleBridge.hovered(true);
      });

      document.body.addEventListener("mouseleave", () => {
        setExpanded(false);
        content.scrollTop = 0;
        window.replyBubbleBridge.hovered(false);
      });

      content.addEventListener(
        "wheel",
        (event) => {
          if (!expanded) {
            return;
          }

          event.preventDefault();
          const nextDelta = Math.max(
            -SCROLL_DELTA_MAX,
            Math.min(SCROLL_DELTA_MAX, event.deltaY * SCROLL_DELTA_SCALE)
          );
          content.scrollTop += nextDelta;
        },
        { passive: false }
      );
    </script>
  </body>
  </html>
